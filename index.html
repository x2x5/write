<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>顶会写作技能</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-layer bg-layer-a" aria-hidden="true"></div>
    <div class="bg-layer bg-layer-b" aria-hidden="true"></div>
    <main class="page">
      <header class="hero">
        <div class="hero-head">
          <div class="hero-title-wrap">
            <h1>顶会写作技能</h1>
            <span class="hero-tip">支持拖动排序</span>
          </div>
          <div class="hero-actions">
            <button id="openAddBtn" class="open-add-btn" type="button">+ 新增卡片</button>
            <button id="resetUsageBtn" class="reset-usage-btn" type="button">次数清零</button>
          </div>
        </div>
      </header>

      <section id="notice" class="notice hidden" aria-live="polite">
        <p id="noticeText"></p>
        <label for="manualFile" class="manual-load-btn hidden">选择本地 README.md</label>
        <input id="manualFile" type="file" accept=".md,text/markdown" class="hidden" />
      </section>

      <section class="zone common-zone" aria-label="主力卡片区">
        <section id="commonRoot" class="cards" aria-label="主力卡片列表"></section>
      </section>

      <details id="poolPanel" class="zone pool-zone">
        <summary>
          <span>替补卡片</span>
        </summary>
        <section id="poolRoot" class="cards" aria-label="替补卡片列表"></section>
      </details>

      <details id="trashPanel" class="zone trash-zone">
        <summary>
          <span>垃圾卡片</span>
          <button id="clearTrashBtn" class="clear-trash-btn" type="button">清空垃圾</button>
        </summary>
        <section id="trashRoot" class="cards" aria-label="垃圾卡片列表"></section>
      </details>
    </main>

    <div id="addModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="addModalTitle">
      <div id="addModalMask" class="modal-mask"></div>
      <section class="modal-panel">
        <h3 id="addModalTitle">新增卡片</h3>
        <details class="meta-template-panel">
          <summary>
            <span>元模板</span>
            <span id="metaStatusText" class="meta-status"></span>
          </summary>
          <textarea id="metaTemplateInput" readonly></textarea>
        </details>
        <label>
          需求
          <textarea id="metaNeedInput" placeholder="例如：把论文 Introduction 压缩成顶会风格 Abstract，300字内。"></textarea>
        </label>
        <div class="add-form-actions">
          <button id="copyMetaBtn" class="create-btn" type="button">复制元模板 + 需求</button>
        </div>
        <label>
          Skills
          <textarea id="addPromptInput" placeholder="粘贴 AI 返回内容：第一行写标题，后续写完整 skills 模板。"></textarea>
        </label>
        <div class="add-form-actions">
          <button id="createCardBtn" class="create-btn" type="button">创建卡片</button>
          <button id="cancelAddBtn" type="button">取消</button>
        </div>
        <p id="addStatusText" class="add-status"></p>
      </section>
    </div>

    <template id="cardTemplate">
      <article class="card">
        <header class="card-head">
          <div class="card-head-top">
            <h2 class="card-title"></h2>
            <div class="card-icon-actions">
              <button class="icon-btn edit-btn" type="button" aria-label="修改卡片" title="修改卡片">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 17.25V21h3.75L19.81 7.94l-3.75-3.75L3 17.25zm14.71-9.04a1 1 0 0 0 0-1.41l-1.5-1.5a1 1 0 0 0-1.41 0l-1.13 1.12 3.75 3.75 1.29-1.96z"/>
                </svg>
              </button>
              <button class="icon-btn clear-input-btn" type="button" aria-label="清空输入" title="清空输入">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.92 7.92 0 0 0 20 13c0-4.42-3.58-8-8-8zm-6 6c0-1.01.25-1.97.7-2.8L5.24 6.74A7.92 7.92 0 0 0 4 11c0 4.42 3.58 8 8 8v4l5-5-5-5v4c-3.31 0-6-2.69-6-6z"/>
                </svg>
              </button>
              <button class="icon-btn delete-btn hidden" type="button" aria-label="删除卡片" title="删除卡片">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M6 7h12l-1 14H7L6 7zm3-3h6l1 1h4v2H4V5h4l1-1z"/>
                </svg>
              </button>
            </div>
          </div>
          <p class="card-subtitle"></p>
        </header>
        <textarea class="card-input" placeholder="把要处理的内容贴在这里..."></textarea>
        <div class="card-actions">
          <button class="copy-btn" type="button">复制全部</button>
          <button class="toggle-btn" type="button"></button>
        </div>
        <section class="edit-panel hidden">
          <label>
            标题
            <input class="edit-title" type="text" />
          </label>
          <label>
            模板内容
            <textarea class="edit-prompt"></textarea>
          </label>
          <div class="edit-actions">
            <button class="save-edit-btn" type="button">保存修改</button>
            <button class="cancel-edit-btn" type="button">取消</button>
          </div>
        </section>
        <p class="copy-status" aria-live="polite"></p>
        <details class="prompt-preview">
          <summary>查看模板</summary>
          <pre></pre>
        </details>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
